_format_version: "2.1"

services:
  - name: supabase-rest
    url: http://db:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
    plugins:
      - name: cors

  - name: supabase-realtime
    url: http://db:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1

  - name: supabase-auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
