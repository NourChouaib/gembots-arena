<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2D8E"/>
      <stop offset="50%" stop-color="#c040e0"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <linearGradient id="gemLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00838f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Outer glow -->
  <polygon points="256,52 356,140 356,310 256,420 156,310 156,140" 
           fill="#c040e0" opacity="0.15" filter="url(#glowStrong)"/>
  
  <!-- Crystal body -->
  <polygon points="256,62 350,145 350,305 256,410 162,305 162,145" 
           fill="url(#gem)" opacity="0.9"/>
  
  <!-- Crystal facets - left -->
  <polygon points="256,62 162,145 162,225 256,180" fill="url(#gemLight)" opacity="0.3"/>
  
  <!-- Crystal facets - right -->
  <polygon points="256,62 350,145 350,225 256,180" fill="#E040FB" opacity="0.25"/>
  
  <!-- Crystal bottom facets -->
  <polygon points="162,305 256,410 256,330" fill="#5B1D6E" opacity="0.5"/>
  <polygon points="350,305 256,410 256,330" fill="#7B2D8E" opacity="0.4"/>
  
  <!-- Crystal edge highlights -->
  <line x1="256" y1="62" x2="162" y2="145" stroke="#f0abfc" stroke-width="1.5" opacity="0.6"/>
  <line x1="256" y1="62" x2="350" y2="145" stroke="#f0abfc" stroke-width="1.5" opacity="0.6"/>
  <line x1="162" y1="145" x2="162" y2="305" stroke="#a855f7" stroke-width="1" opacity="0.4"/>
  <line x1="350" y1="145" x2="350" y2="305" stroke="#E040FB" stroke-width="1" opacity="0.4"/>
  
  <!-- Eye - outer shape -->
  <ellipse cx="256" cy="228" rx="70" ry="42" fill="none" stroke="#00e5ff" stroke-width="3" 
           filter="url(#glow)" opacity="0.9"/>
  
  <!-- Eye - iris outer -->
  <circle cx="256" cy="228" r="30" fill="url(#eye)" opacity="0.8"/>
  
  <!-- Eye - iris inner -->
  <circle cx="256" cy="228" r="20" fill="#00bcd4"/>
  
  <!-- Eye - pupil -->
  <circle cx="256" cy="228" r="10" fill="#0a1628"/>
  
  <!-- Eye - highlight -->
  <circle cx="263" cy="220" r="5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="234" r="2.5" fill="white" opacity="0.4"/>
  
  <!-- Circuit traces - top -->
  <line x1="256" y1="185" x2="256" y2="155" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="152" r="3" fill="#00e5ff" opacity="0.5"/>
  <line x1="240" y1="190" x2="230" y2="165" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <circle cx="229" cy="162" r="2" fill="#00e5ff" opacity="0.35"/>
  <line x1="272" y1="190" x2="282" y2="165" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <circle cx="283" cy="162" r="2" fill="#00e5ff" opacity="0.35"/>
  
  <!-- Circuit traces - bottom -->
  <line x1="256" y1="271" x2="256" y2="301" stroke="#00e5ff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="304" r="3" fill="#00e5ff" opacity="0.5"/>
  <line x1="240" y1="266" x2="230" y2="291" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <circle cx="229" cy="294" r="2" fill="#00e5ff" opacity="0.35"/>
  <line x1="272" y1="266" x2="282" y2="291" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <circle cx="283" cy="294" r="2" fill="#00e5ff" opacity="0.35"/>
  
  <!-- Text: GemBots -->
  <text x="256" y="468" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" 
        font-weight="bold" font-size="46" fill="white" letter-spacing="3">
    💎 GemBots
  </text>
</svg>
